services:
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - microservices-network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - microservices-network

  auth-service:
    build: ./auth-service
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/auth_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NGINX_URL: http://nginx
    depends_on:
      - mongodb
    networks:
      - microservices-network

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/user_db
      JWT_SECRET: ${JWT_SECRET}
      NGINX_URL: http://nginx
    depends_on:
      - postgres
    networks:
      - microservices-network

  todo-service:
    build: ./todo-service
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/todo_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NGINX_URL: http://nginx
    depends_on:
      - mongodb
    networks:
      - microservices-network

  category-service:
    build: ./category-service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/category_db
      JWT_SECRET: ${JWT_SECRET}
      NGINX_URL: http://nginx
    depends_on:
      - postgres
    networks:
      - microservices-network

  comment-service:
    build: ./comment-service
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/comment_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NGINX_URL: http://nginx
    depends_on:
      - mongodb
    networks:
      - microservices-network

  statistics-service:
    build: ./statistics-service
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/stats_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NGINX_URL: http://nginx
    depends_on:
      - mongodb
    networks:
      - microservices-network

  notification-service:
    build: ./notification-service
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/notification_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NGINX_URL: http://nginx
    depends_on:
      - mongodb
    networks:
      - microservices-network

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - todo-service
      - category-service
      - comment-service
      - statistics-service
      - notification-service
      - frontend
    networks:
      - microservices-network

  frontend:
    build: ./frontend
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
